server:
  port: 8081

spring:
  application:
    name: banking-payment-service
  profiles:
    default: dev
  cache:
    type: redis
    cache-names:
      - accounts
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.bankingpaymentservice.kafka
        spring.json.value.default.type: com.example.bankingpaymentservice.kafka.TransactionEvent
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

security:
  jwt:
    secret: ${JWT_SECRET:banking-payment-service-jwt-secret-key-change-me-1234567890}
    expiration-ms: 86400000

services:
  account-service:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}

resilience4j:
  retry:
    instances:
      accountService:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - feign.RetryableException
          - feign.FeignException$ServiceUnavailable
          - feign.FeignException$InternalServerError
          - feign.FeignException$BadGateway
          - feign.FeignException$GatewayTimeout
          - feign.FeignException$FeignServerException
        ignore-exceptions:
          - com.example.bankingpaymentservice.exception.AccountClientNotFoundException
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 3
        minimum-number-of-calls: 3
        failure-rate-threshold: 100
        permitted-number-of-calls-in-half-open-state: 2
        wait-duration-in-open-state: 5s
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - feign.RetryableException
          - feign.FeignException$ServiceUnavailable
          - feign.FeignException$InternalServerError
          - feign.FeignException$BadGateway
          - feign.FeignException$GatewayTimeout
          - feign.FeignException$FeignServerException
        ignore-exceptions:
          - com.example.bankingpaymentservice.exception.AccountClientNotFoundException

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,cacheevict,circuitbreakers,circuitbreakerevents,retries,retryevents
  endpoint:
    health:
      show-details: when_authorized

info:
  app:
    name: banking-payment-service
    description: Banking payment service with JWT, async checks, Redis, and Kafka support

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/banking_payment_service_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:banking_payment_service_prod}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
