server:
  port: 8761

spring:
  application:
    name: banking-eureka-server

logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-N/A}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

info:
  app:
    name: banking-eureka-server
    description: Service registry for the banking platform

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:${server.port}/eureka/
  server:
    enable-self-preservation: false
