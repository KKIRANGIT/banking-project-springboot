server:
  port: 8761

spring:
  application:
    name: banking-eureka-server

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    tags:
      application: ${spring.application.name}
      service: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

info:
  app:
    name: banking-eureka-server
    description: Service registry for the banking platform

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:${server.port}/eureka/
  server:
    enable-self-preservation: false
