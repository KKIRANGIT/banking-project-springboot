spring:
  datasource:
    url: jdbc:h2:mem:paymentservice;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false
  cache:
    type: simple
  data:
    redis:
      repositories:
        enabled: false
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    admin:
      auto-create: false

security:
  jwt:
    secret: banking-payment-service-jwt-secret-key-change-me-1234567890
    expiration-ms: 86400000

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

management:
  health:
    redis:
      enabled: false
